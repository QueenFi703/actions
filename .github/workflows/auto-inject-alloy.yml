name: Auto Inject Alloy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"

permissions:
  contents: write

# ⚡ Prevent multiple injector runs colliding
concurrency:
  group: alloy-inject-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inject:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject Alloy into workflows
        shell: bash
        run: |
          set -e

          changed=0

          for file in .github/workflows/*.yml; do

            # Skip self
            if [[ "$file" == ".github/workflows/auto-inject-alloy.yml" ]]; then
              echo "⏭ Skipping self: $file"
              continue
            fi

            # Safer idempotency check (look for exact step name)
            if grep -q "Start Alloy" "$file"; then
              echo "✔ Already instrumented: $file"
              continue
            fi

            # Must contain steps block
            if ! grep -qE '^[[:space:]]*steps:' "$file"; then
              echo "⏭ No steps block found, skipping: $file"
              continue
            fi

            echo "⚡ Injecting Alloy into $file"

            tmp=$(mktemp)

            awk '
              BEGIN { injected=0 }

              /^[[:space:]]*steps:[[:space:]]*$/ && !injected {
                print
                print "      - name: Start Alloy"
                print "        uses: ./.github/actions/alloy"
                injected=1
                next
              }

              { print }
            ' "$file" > "$tmp"

            mv "$tmp" "$file"
            changed=1
          done

          if [ "$changed" -eq 0 ]; then
            echo "✅ All workflows already instrumented — nothing to commit."
          fi

      - name: Commit injected changes
        shell: bash
        run: |
          git config user.name "dot-bot"
          git config user.email "dot@users.noreply.github.com"

          git add .github/workflows/*.yml || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "🔧 Auto-inject Alloy into workflows"
          git push
