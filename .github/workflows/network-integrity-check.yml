name: Network Integrity Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release/**"
    paths-ignore:
      - "dist/**"
  pull_request:

permissions:
  contents: read

jobs:
  network-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start MITM proxy
        run: |
          pip install mitmproxy
          # Write captured flows to a file for later inspection.
          # --ssl-insecure allows interception of TLS traffic on the runner.
          mitmdump --listen-port 8082 --save-stream-file /tmp/mitm-flows.bin \
            --ssl-insecure 2>/tmp/mitm.log &
          echo "MITM_PID=$!" >> "$GITHUB_ENV"
          echo "MITM_PORT=8082" >> "$GITHUB_ENV"
          # Wait briefly for the proxy to bind its port
          for i in $(seq 1 10); do
            ss -tlnp | grep -q ':8082' && echo "mitmproxy ready" && break
            sleep 1
          done
          # Ensure the mitmproxy CA cert is readable by Node.js
          mkdir -p /root/.mitmproxy
          chmod -R a+rX /root/.mitmproxy || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sources/package-lock.json

      - name: Install npm dependencies
        working-directory: sources
        run: npm ci

      - name: Run tests through proxy
        working-directory: sources
        env:
          HTTP_PROXY: http://localhost:${{ env.MITM_PORT }}
          HTTPS_PROXY: http://localhost:${{ env.MITM_PORT }}
          # Tell Node.js TLS to trust the mitmproxy CA so HTTPS calls succeed
          NODE_EXTRA_CA_CERTS: /root/.mitmproxy/mitmproxy-ca-cert.pem
        run: npm test

      - name: Analyze traffic logs
        if: always()
        run: |
          echo "=== mitmproxy process log ==="
          cat /tmp/mitm.log || true

          echo ""
          echo "=== Traffic summary (flow count) ==="
          # mitmdump can re-read its own binary flow file and print human-readable output
          mitmdump --rfile /tmp/mitm-flows.bin 2>/dev/null | tee /tmp/mitm-readable.txt || true
          echo "Total intercepted flows: $(grep -c '^>>' /tmp/mitm-readable.txt || echo 0)"

          echo ""
          echo "=== Scanning for potential secret leaks ==="
          # Flag lines that contain common secret patterns (tokens, passwords, keys).
          # Adjust the regex to match your own secret naming conventions.
          if grep -iE 'authorization|bearer [a-z0-9._-]{10,}|password=|secret=|api[_-]?key=' \
               /tmp/mitm-readable.txt 2>/dev/null; then
            echo "⚠️  Potential credential exposure detected in intercepted traffic."
            echo "    Review the lines above and ensure secrets are not leaked over the network."
          else
            echo "✅  No obvious credential patterns found in intercepted traffic."
          fi

      - name: Stop MITM proxy
        if: always()
        run: kill "$MITM_PID" 2>/dev/null || true
