name: Publish GitHub App

on:
  workflow_dispatch:
    inputs:
      action:
        description: Choose step
        required: true
        type: choice
        options:
          - generate-registration-url
          - save-credentials
          - check-status

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Registration URL
        if: inputs.action == 'generate-registration-url'
        run: npx ts-node --esm scripts/generateManifestUrl.ts

      - name: Save Credentials
        if: inputs.action == 'save-credentials'
        run: npx ts-node --esm scripts/exchangeCodeForToken.ts
        env:
          CODE: ${{ secrets.APP_REGISTRATION_CODE }}
          SETUP_PAT: ${{ secrets.SETUP_PAT }}

      - name: Check Status
        if: inputs.action == 'check-status'
        run: npx ts-node --esm scripts/checkStatus.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

