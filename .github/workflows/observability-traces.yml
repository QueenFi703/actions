name: DOT Observability Layer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"

jobs:
  observe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Alloy (OTLP Receiver)
        run: |
          docker run -d --name alloy \
            -p 4317:4317 -p 4318:4318 \
            -v "$PWD/monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro" \
            -e GRAFANA_CLOUD_OTLP_ENDPOINT="${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}" \
            -e GRAFANA_CLOUD_AUTH="${{ secrets.GRAFANA_CLOUD_AUTH }}" \
            grafana/alloy:latest \
            run /etc/alloy/config.alloy

      - name: Wait for Alloy
        run: |
          for i in $(seq 1 20); do
            if docker exec alloy wget -qO- http://localhost:12345/-/ready 2>/dev/null | grep -q ready; then
              echo "Alloy is ready"; break
            fi
            echo "Waiting for Alloy ($i/20)..."; sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sources/.nvmrc

      - name: Install dependencies
        working-directory: sources
        run: npm ci

      - name: Build
        working-directory: sources
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_SERVICE_NAME: dot-ci-actions
        run: npm run build

      - name: Run tests
        working-directory: sources
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_SERVICE_NAME: dot-ci-actions
        run: npm test

      - name: Dump Alloy Logs
        if: always()
        run: docker logs alloy --tail=200

      - name: Cleanup Alloy
        if: always()
        run: docker rm -f alloy || true
