name: DOT Observability Layer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"

jobs:
  observe:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Start Grafana Alloy
        uses: ./.github/actions/setup-alloy
        with:
          service-name: dot-ci-actions
          grafana-endpoint: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          grafana-auth: ${{ secrets.GRAFANA_CLOUD_AUTH }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sources/.nvmrc

      - name: Install dependencies
        working-directory: sources
        run: npm ci

      - name: Build
        working-directory: sources
        run: npm run build

      - name: Run tests
        working-directory: sources
        run: npm test

      - name: Teardown Grafana Alloy
        if: always()
        uses: ./.github/actions/teardown-alloy
