name: Reusable Inspector

on:
  workflow_call:

  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  inspect:
    # 🧠 Guard: run always for workflow_call, but for workflow_run only if NOT success
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'success' }}

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start Grafana Alloy
        uses: ./.github/actions/alloy
        with:
          service-name: reusable-inspector

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/checkout@v5

- uses: actions/setup-node@v5
  with:
    node-version: 20
    cache: 'npm'

# Force consistent npm version (prevents lockfile drift)
- run: npm i -g npm@10

# Safety check: fail if lockfile is out of sync
- run: npm install --package-lock-only
- run: git diff --exit-code package-lock.json

# Clean install (deterministic)
- run: npm ci

      # 🔥 Only run healer when something actually failed
      - name: Run Self-Healing Agent
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
        run: node dist/src/agent/healer.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GITHUB_APP_INSTALLATION_ID }}
