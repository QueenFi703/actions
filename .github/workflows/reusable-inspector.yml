name: Reusable Inspector

on:
  workflow_call:

jobs:
  inspect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Inspector
        run: npx ts-node --esm scripts/checkStatus.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
