name: Reusable Inspector

on:
  workflow_call:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Inspector
        run: npx ts-node --esm scripts/checkStatus.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
